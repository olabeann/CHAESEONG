<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>부의금 내역</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root {
  --blue: #3B6EF8;
  --blue-light: #EEF2FF;
  --purple: #7C5CFC;
  --purple-light: #F3EFFF;
  --green: #1BC47D;
  --green-light: #E6FAF3;
  --gray-50: #F8F9FC;
  --gray-200: #E4E8F0;
  --gray-400: #9BA5B8;
  --gray-500: #6B7690;
  --gray-700: #3A4259;
  --gray-900: #1A1E2E;
  --white: #ffffff;
  --shadow-sm: 0 2px 8px rgba(30,40,80,0.07);
  --shadow-md: 0 4px 20px rgba(30,40,80,0.10);
  --radius: 16px;
  --radius-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: var(--gray-50);
  color: var(--gray-900);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── sticky 헤더 전체 묶음 ─── */
.sticky-header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  box-shadow: 0 2px 12px rgba(30,40,80,0.08);
}

/* 상단 바 */
.top-bar {
  display: flex;
  align-items: center;
  padding: 0 20px;
  height: 72px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 9px;
  font-size: 32px;
  font-weight: 800;
  color: var(--blue);
  letter-spacing: -0.5px;
}
.logo-dot {
  width: 13px; height: 13px;
  border-radius: 50%;
  background: var(--blue);
}

/* 검색창 */
.search-wrap {
  padding: 0 14px 12px;
}
.search-box {
  position: relative;
  background: var(--gray-50);
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--gray-200);
  overflow: hidden;
  transition: border-color 0.15s;
}
.search-box:focus-within {
  border-color: var(--blue);
  background: var(--white);
}
.search-icon {
  position: absolute;
  left: 18px; top: 50%;
  transform: translateY(-50%);
  font-size: 26px;
  color: var(--gray-400);
  pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 18px 56px 18px 62px;
  border: none;
  font-size: 26px;
  font-family: 'Pretendard', sans-serif;
  font-weight: 500;
  color: var(--gray-900);
  background: transparent;
  outline: none;
}
.search-input::placeholder { color: var(--gray-400); font-weight: 400; }
.search-clear {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--gray-200);
  border: none;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--gray-500);
}
.search-clear.show { display: flex; }

/* 그룹 필터 탭 */
.filter-wrap {
  display: flex;
  gap: 7px;
  overflow-x: auto;
  padding: 0 14px 12px;
  scrollbar-width: none;
}
.filter-wrap::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 10px 22px;
  border-radius: 100px;
  border: 1.5px solid var(--gray-200);
  background: var(--white);
  font-size: 22px;
  font-family: 'Pretendard', sans-serif;
  font-weight: 600;
  color: var(--gray-500);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.chip.active {
  background: var(--blue);
  border-color: var(--blue);
  color: #fff;
  box-shadow: 0 3px 10px rgba(59,110,248,0.28);
}

/* ─── 정렬 바 ─── */
.meta-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px 6px;
}
.sort-group {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
}
.sort-label {
  font-size: 22px;
  color: var(--gray-400);
  font-weight: 500;
}
.sort-btn {
  flex: 1;
  padding: 12px 0;
  border-radius: 12px;
  border: 1.5px solid var(--gray-200);
  background: var(--white);
  font-size: 22px;
  font-family: 'Pretendard', sans-serif;
  font-weight: 600;
  color: var(--gray-500);
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}
.sort-btn.active {
  background: var(--gray-900);
  border-color: var(--gray-900);
  color: #fff;
}
.result-info {
  text-align: right;
  line-height: 1.4;
}
.result-count { font-size: 22px; color: var(--gray-400); font-weight: 500; }
.result-count strong { color: var(--blue); font-weight: 700; }
.result-sum { font-size: 24px; font-weight: 800; color: var(--gray-700); letter-spacing: -0.3px; }

/* ─── 카드 리스트 ─── */
.list {
  padding: 6px 14px 48px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.card {
  background: var(--white);
  border-radius: var(--radius);
  padding: 20px 18px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--gray-200);
  display: flex;
  align-items: center;
  gap: 16px;
  transition: box-shadow 0.15s, transform 0.1s;
}
.card:active { box-shadow: var(--shadow-md); transform: scale(0.99); }

.avatar {
  width: 72px; height: 72px;
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; font-weight: 800;
  flex-shrink: 0;
}
.avatar.blue  { background: var(--blue-light);   color: var(--blue); }
.avatar.purple{ background: var(--purple-light);  color: var(--purple); }
.avatar.green { background: var(--green-light);   color: var(--green); }

.card-body { flex: 1; min-width: 0; }
.card-name {
  font-size: 28px; font-weight: 700;
  color: var(--gray-900);
  letter-spacing: -0.3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 8px;
}
.tags { display: flex; flex-wrap: wrap; gap: 5px; }
.tag {
  display: inline-flex; align-items: center;
  padding: 4px 12px;
  border-radius: 8px;
  font-size: 18px; font-weight: 700;
}
.tag-group  { background: var(--blue-light);  color: var(--blue); }
.tag-bank   { background: #FFF7ED; color: #D97706; }
.tag-sms    { background: var(--green-light); color: #0D9E63; }
.tag-kakao  { background: #FEFCE8; color: #CA8A04; }
.tag-unknown{ background: #FEF2F2; color: #DC2626; }

.card-right { flex-shrink: 0; text-align: right; }
.amount {
  font-size: 32px; font-weight: 800;
  color: var(--blue);
  letter-spacing: -0.5px;
  line-height: 1;
}
.amount.high  { color: var(--purple); }
.amount.vhigh { color: #E53E3E; }
.amount-unit  { font-size: 18px; font-weight: 600; color: var(--gray-400); margin-top: 3px; }

/* 그룹 헤더 */
.group-header {
  padding: 14px 4px 5px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1.5px solid var(--gray-200);
  margin-bottom: 2px;
}
.group-header-name { font-size: 22px; font-weight: 700; color: var(--gray-500); }
.group-header-total { font-size: 22px; font-weight: 700; color: var(--blue); }

/* 빈 결과 */
.empty {
  text-align: center; padding: 60px 20px;
  color: var(--gray-400); font-size: 26px; font-weight: 500;
}
.empty-icon { font-size: 72px; margin-bottom: 16px; opacity: 0.5; }
</style>
</head>

// 필터 탭 생성
const groups = ['전체', ...new Set(DATA.map(r=>r.그룹||'개인').filter(Boolean).sort())];
const filterWrap = document.getElementById('filterWrap');
groups.forEach(g => {
  const btn = document.createElement('button');
  btn.className = 'chip' + (g==='전체'?' active':'');
  btn.dataset.group = g;
  btn.textContent = g;
  filterWrap.appendChild(btn);
});

let activeGroup = '전체', activeSort = 'name', searchTerm = '';

const avatarColors = ['blue','purple','green'];
const getColor = name => avatarColors[name.charCodeAt(0) % 3];

function getFiltered() {
  let d = DATA.map(r=>({...r, 그룹표시: r.그룹||'개인'}));
  if(activeGroup!=='전체') d = d.filter(r=>r.그룹표시===activeGroup);
  if(searchTerm) {
    const q = searchTerm.toLowerCase();
    d = d.filter(r=>r.이름.toLowerCase().includes(q)||r.그룹표시.toLowerCase().includes(q));
  }
  if(activeSort==='name')   d.sort((a,b)=>a.이름.localeCompare(b.이름,'ko'));
  else if(activeSort==='amount') d.sort((a,b)=>b.금액-a.금액);
  else if(activeSort==='group')  d.sort((a,b)=>a.그룹표시.localeCompare(b.그룹표시,'ko')||a.이름.localeCompare(b.이름,'ko'));
  return d;
}

function fmtAmt(n) { return n>=10000 ? (n/10000)+'만' : n.toLocaleString(); }
function fmtFull(n){ return n.toLocaleString()+'원'; }

function render() {
  const data = getFiltered();
  const list = document.getElementById('list');
  list.innerHTML = '';

  if(!data.length){
    list.innerHTML='<div class="empty"><div class="empty-icon">🔍</div>검색 결과가 없습니다</div>';
    return;
  }

  if(activeSort==='group'){
    const grouped={};
    data.forEach(r=>{ if(!grouped[r.그룹표시]) grouped[r.그룹표시]=[]; grouped[r.그룹표시].push(r); });
    Object.entries(grouped).forEach(([g,rows])=>{
      const gh=document.createElement('div');
      gh.className='group-header';
      const gSum=rows.reduce((a,r)=>a+r.금액,0);
      gh.innerHTML=`<span class="group-header-name">${g}</span><span class="group-header-total">${fmtFull(gSum)}</span>`;
      list.appendChild(gh);
      rows.forEach(r=>list.appendChild(makeCard(r)));
    });
  } else {
    data.forEach(r=>list.appendChild(makeCard(r)));
  }
}

function makeCard(r){
  const card=document.createElement('div');
  card.className='card';
  const color=getColor(r.이름);
  const isBank=r.방식==='은행계좌입금';
  const amtClass=r.금액>=500000?'amount vhigh':r.금액>=300000?'amount high':'amount';

  let tags='';
  if(r.그룹&&r.그룹!=='개인') tags+=`<span class="tag tag-group">${r.그룹}</span>`;
  if(isBank)                   tags+=`<span class="tag tag-bank">계좌입금</span>`;
  if(r.문자==='O')             tags+=`<span class="tag tag-sms">문자✓</span>`;
  else if(r.문자==='카톡O')    tags+=`<span class="tag tag-kakao">카톡✓</span>`;
  else if(r.문자==='모르는 사람') tags+=`<span class="tag tag-unknown">모르는 분</span>`;
  // X(미확인)은 표시 안 함

  card.innerHTML=`
    <div class="avatar ${color}">${r.이름.charAt(0)}</div>
    <div class="card-body">
      <div class="card-name">${r.이름}</div>
      <div class="tags">${tags}</div>
    </div>
    <div class="card-right">
      <div class="${amtClass}">${fmtAmt(r.금액)}</div>
      <div class="amount-unit">원</div>
    </div>
  `;
  return card;
}

// 이벤트
document.getElementById('searchInput').addEventListener('input', e=>{
  searchTerm=e.target.value;
  document.getElementById('searchClear').classList.toggle('show', !!searchTerm);
  render();
});
document.getElementById('searchClear').addEventListener('click', ()=>{
  const inp=document.getElementById('searchInput');
  inp.value=''; searchTerm='';
  document.getElementById('searchClear').classList.remove('show');
  inp.focus();
  render();
});

filterWrap.addEventListener('click', e=>{
  const btn=e.target.closest('.chip');
  if(!btn) return;
  document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeGroup=btn.dataset.group;
  render();
});

document.querySelectorAll('.sort-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeSort=btn.dataset.sort;
    render();
  });
});

render();
</script>
